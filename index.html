<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0e0e12">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Coding Plan · AI 对话</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0e0e12;--bg2:#16161c;--bg3:#1e1e28;
  --border:#2e2e3e;--border2:#3a3a50;
  --gold:#e0a355;--gold-dim:#8a5f28;--gold-glow:rgba(224,163,85,.15);
  --text:#d8d4cc;--text2:#9090a0;--text3:#505060;
  --green:#5ac87a;--red:#e05555;
  --code-bg:#0a0a10;--code-fg:#7ec8a0;
  --user-bg:#1a281a;--user-bd:#2a4a2a;--user-txt:#c8e8c0;
  --hdr:48px;--r:8px;
  --mono:'JetBrains Mono','Consolas','Courier New',monospace;
  --sans:-apple-system,'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
}

html{height:100%;overflow:hidden}
body{
  height:100%;overflow:hidden;
  background:var(--bg);color:var(--text);
  font-family:var(--sans);font-size:14px;line-height:1.6;
  -webkit-font-smoothing:antialiased;
  position:fixed;width:100%;
}

/* ══════════════════════════════════════
   SHELL — desktop: sidebar + chat
══════════════════════════════════════ */
#shell{
  display:grid;
  grid-template-rows:var(--hdr) 1fr;
  grid-template-columns:280px 1fr;
  grid-template-areas:"hdr hdr" "side main";
  height:100%;overflow:hidden;
}

/* ── Header ── */
#hdr{
  grid-area:hdr;background:var(--bg2);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;padding:0 14px;z-index:200;
}
.logo-box{
  width:26px;height:26px;border-radius:6px;flex-shrink:0;
  background:linear-gradient(135deg,var(--gold),var(--gold-dim));
  display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:10px;font-weight:700;color:#0e0e12;
  box-shadow:0 0 10px var(--gold-glow);
}
.logo-txt{font-family:var(--mono);font-size:12px;color:var(--text2);letter-spacing:.05em}
.logo-txt b{color:var(--gold)}
.hdr-sp{flex:1}
#conn{
  display:flex;align-items:center;gap:5px;
  font-family:var(--mono);font-size:10px;color:var(--text3);
  padding:3px 9px;border-radius:20px;border:1px solid var(--border);background:var(--bg3);
  transition:all .2s;white-space:nowrap;
}
#conn .dot{width:6px;height:6px;border-radius:50%;background:var(--text3);flex-shrink:0}
#conn.ready{border-color:#5ac87a33;color:var(--green)}
#conn.ready .dot{background:var(--green);box-shadow:0 0 5px var(--green);animation:blink 2s infinite}
#conn.busy{border-color:var(--gold-dim);color:var(--gold)}
#conn.busy .dot{background:var(--gold);animation:pls 1s infinite}
#conn.error{border-color:#e0555533;color:var(--red)}
#conn.error .dot{background:var(--red)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes pls{0%,100%{transform:scale(1)}50%{transform:scale(1.6)}}

/* hamburger — hidden on desktop */
#menu-btn{
  display:none;background:none;border:none;color:var(--text2);
  padding:6px;cursor:pointer;border-radius:6px;flex-shrink:0;
  -webkit-tap-highlight-color:transparent;
}

/* ── Sidebar ── */
#side{
  grid-area:side;background:var(--bg2);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
  transition:transform .25s cubic-bezier(.4,0,.2,1);
}
.side-scroll{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:14px 13px 24px;
  display:flex;flex-direction:column;gap:16px;
  -webkit-overflow-scrolling:touch;
}
.side-scroll::-webkit-scrollbar{width:2px}
.side-scroll::-webkit-scrollbar-thumb{background:var(--border2)}

.sec-hd{
  font-family:var(--mono);font-size:9.5px;font-weight:600;
  letter-spacing:.18em;text-transform:uppercase;color:var(--gold-dim);
  margin-bottom:8px;display:flex;align-items:center;gap:6px;
}
.sec-hd::after{content:'';flex:1;height:1px;background:var(--border)}

/* form fields — font-size 16px prevents iOS zoom */
.f{margin-bottom:9px}
.f label{display:block;font-family:var(--mono);font-size:9.5px;color:var(--text3);margin-bottom:4px}
.f input,.f textarea{
  width:100%;background:var(--bg3);border:1px solid var(--border);
  border-radius:6px;color:var(--text);padding:7px 10px;
  font-family:var(--mono);font-size:16px;outline:none;
  -webkit-appearance:none;
  transition:border-color .15s,box-shadow .15s;
}
.f input:focus,.f textarea:focus{border-color:var(--gold-dim);box-shadow:0 0 0 2px var(--gold-glow)}
.f input::placeholder,.f textarea::placeholder{color:var(--text3)}
.f textarea{resize:none;line-height:1.5}

/* proto tabs */
.tabs{display:flex;gap:4px;margin-bottom:7px}
.tab{
  flex:1;padding:6px;font-family:var(--mono);font-size:10px;
  background:var(--bg3);border:1px solid var(--border);border-radius:5px;
  color:var(--text3);cursor:pointer;text-align:center;transition:all .13s;
  -webkit-tap-highlight-color:transparent;
}
.tab.on{background:var(--gold-glow);border-color:var(--gold-dim);color:var(--gold)}

/* model list */
.mlist{display:flex;flex-direction:column;gap:3px}
.mitem{
  display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;
  border:1px solid var(--border);background:var(--bg3);
  cursor:pointer;transition:all .12s;user-select:none;
  -webkit-tap-highlight-color:transparent;
}
.mitem.on{border-color:var(--gold-dim);background:var(--gold-glow)}
.mdot{width:6px;height:6px;border-radius:50%;background:var(--border2);flex-shrink:0}
.mitem.on .mdot{background:var(--gold);box-shadow:0 0 5px var(--gold)}
.mname{flex:1;font-size:12px;color:var(--text2)}
.mitem.on .mname{color:var(--gold)}
.mtag{font-family:var(--mono);font-size:9px;padding:1px 5px;border-radius:3px;background:var(--bg);border:1px solid var(--border);color:var(--text3)}
.mitem.on .mtag{border-color:var(--gold-dim);color:var(--gold-dim)}

/* slider */
.srow{display:flex;align-items:center;gap:8px}
.srow input[type=range]{
  flex:1;height:3px;background:var(--border);border:none;border-radius:2px;
  outline:none;cursor:pointer;-webkit-appearance:none;appearance:none;padding:0;
}
.srow input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:18px;height:18px;
  border-radius:50%;background:var(--gold);cursor:pointer;
}

/* ── Main chat ── */
#main{grid-area:main;display:flex;flex-direction:column;overflow:hidden}

#tbar{
  flex-shrink:0;display:flex;align-items:center;gap:8px;
  padding:7px 12px;background:var(--bg2);border-bottom:1px solid var(--border);
}
.tbar-m{font-family:var(--mono);font-size:10.5px;color:var(--text3)}
.tbar-m span{color:var(--gold)}
.tbar-sp{flex:1}
.tbtn{
  font-family:var(--mono);font-size:10px;
  background:var(--bg3);border:1px solid var(--border);color:var(--text3);
  padding:5px 11px;border-radius:5px;cursor:pointer;transition:all .12s;
  -webkit-tap-highlight-color:transparent;white-space:nowrap;
}
.tbtn:hover{border-color:var(--border2);color:var(--text2)}
.tbtn.del:hover{border-color:var(--red);color:var(--red)}

/* messages */
#msgs{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:16px 12px;display:flex;flex-direction:column;gap:14px;
  scroll-behavior:smooth;-webkit-overflow-scrolling:touch;
}
#msgs::-webkit-scrollbar{width:2px}
#msgs::-webkit-scrollbar-thumb{background:var(--border)}

/* empty state */
#empty{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:10px;text-align:center;padding:24px;color:var(--text3);
}
.ei{font-size:32px;opacity:.18;margin-bottom:4px}
#empty h2{font-size:15px;font-weight:400;color:var(--text2)}
#empty p{font-family:var(--mono);font-size:11px;max-width:260px;line-height:1.7}
.qrow{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:4px}
.qbtn{
  font-family:var(--mono);font-size:10px;
  background:var(--bg2);border:1px solid var(--border);color:var(--text3);
  padding:5px 10px;border-radius:5px;cursor:pointer;transition:all .12s;
  -webkit-tap-highlight-color:transparent;
}
.qbtn:hover{border-color:var(--gold-dim);color:var(--gold);background:var(--gold-glow)}

/* messages */
.msg{display:flex;gap:8px;max-width:100%;animation:mi .2s ease}
@keyframes mi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg.asst,.msg.err{align-self:flex-start}

.av{
  width:28px;height:28px;border-radius:7px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:9px;font-weight:700;
}
.av.ai{background:linear-gradient(135deg,var(--gold),var(--gold-dim));color:#0e0e12}
.av.you{background:var(--user-bg);border:1px solid var(--user-bd);color:var(--green)}
.av.bad{background:#2a1010;border:1px solid #5a2020;color:var(--red)}

.bbl{
  padding:9px 13px;border-radius:10px;
  line-height:1.75;font-size:13.5px;word-break:break-word;
  max-width:calc(100% - 38px);
}
.msg.asst .bbl{background:var(--bg2);border:1px solid var(--border)}
.msg.user .bbl{background:var(--user-bg);border:1px solid var(--user-bd);color:var(--user-txt)}
.msg.err  .bbl{background:#1a0808;border:1px solid #4a1818;color:#e08080;font-family:var(--mono);font-size:12px;white-space:pre-wrap}

/* markdown in bubbles */
.bbl p{margin-bottom:.5em}.bbl p:last-child{margin-bottom:0}
.bbl h1,.bbl h2,.bbl h3,.bbl h4{font-weight:600;margin:.7em 0 .3em;line-height:1.3}
.bbl h1{font-size:1.1em}.bbl h2{font-size:1.02em}.bbl h3,.bbl h4{font-size:.95em}
.bbl ul,.bbl ol{padding-left:1.3em;margin:.4em 0}.bbl li{margin-bottom:.25em}
.bbl a{color:var(--gold);text-underline-offset:2px}
.bbl blockquote{border-left:2px solid var(--gold-dim);padding-left:10px;color:var(--text2);margin:.5em 0}
.bbl hr{border:none;border-top:1px solid var(--border);margin:.7em 0}
.bbl code{font-family:var(--mono);font-size:.82em;background:var(--code-bg);color:#e8a87c;padding:2px 5px;border-radius:3px}
.bbl pre{background:var(--code-bg);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin:.6em 0}
.code-hdr{display:flex;align-items:center;justify-content:space-between;padding:5px 12px;background:var(--bg3);border-bottom:1px solid var(--border)}
.code-lang{font-family:var(--mono);font-size:10px;color:var(--text3)}
.code-cp{font-family:var(--mono);font-size:10px;color:var(--text3);background:none;border:none;cursor:pointer;padding:2px 8px;border-radius:3px;transition:color .13s;-webkit-tap-highlight-color:transparent}
.code-cp:hover{color:var(--gold)}
.bbl pre code{display:block;background:none;color:var(--code-fg);padding:12px;overflow-x:auto;font-size:.8em;border-radius:0;line-height:1.6}
.bbl strong{font-weight:600}

/* thinking */
.think{display:flex;align-items:center;gap:7px;padding:8px 12px;font-family:var(--mono);font-size:11px;color:var(--text3)}
.tdots{display:flex;gap:4px}
.tdots span{width:5px;height:5px;border-radius:50%;background:var(--gold);animation:td 1.2s infinite}
.tdots span:nth-child(2){animation-delay:.2s}.tdots span:nth-child(3){animation-delay:.4s}
@keyframes td{0%,100%{transform:scale(.6);opacity:.3}50%{transform:scale(1);opacity:1}}
.cur{display:inline-block;width:2px;height:1em;background:var(--gold);margin-left:2px;vertical-align:text-bottom;animation:cr .8s steps(1) infinite}
@keyframes cr{0%,49%{opacity:1}50%,100%{opacity:0}}

/* input */
#inp-area{
  flex-shrink:0;padding:10px 12px 12px;
  background:var(--bg2);border-top:1px solid var(--border);
}
/* safe area on iPhone X+ */
@supports (padding-bottom: env(safe-area-inset-bottom)){
  #inp-area{padding-bottom:calc(12px + env(safe-area-inset-bottom))}
}
.inp-row{display:flex;gap:8px;align-items:flex-end}
#uinput{
  flex:1;background:var(--bg3);border:1px solid var(--border);color:var(--text);
  padding:9px 12px;border-radius:10px;font-family:var(--sans);font-size:16px;
  outline:none;resize:none;line-height:1.5;min-height:42px;max-height:140px;
  transition:border-color .15s,box-shadow .15s;overflow-y:auto;
  -webkit-appearance:none;
}
#uinput:focus{border-color:var(--gold-dim);box-shadow:0 0 0 2px var(--gold-glow)}
#uinput::placeholder{color:var(--text3)}
#uinput::-webkit-scrollbar{width:2px}
#uinput::-webkit-scrollbar-thumb{background:var(--border)}

#send-btn{
  width:42px;height:42px;flex-shrink:0;
  background:linear-gradient(135deg,var(--gold),var(--gold-dim));
  border:none;border-radius:10px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;box-shadow:0 2px 8px var(--gold-glow);
  -webkit-tap-highlight-color:transparent;
}
#send-btn:active:not(:disabled){transform:scale(.93)}
#send-btn:disabled{opacity:.4;cursor:not-allowed}
#send-btn svg{color:#0e0e12}
#stop-btn{
  width:42px;height:42px;flex-shrink:0;
  background:#2a1010;border:1px solid #5a2020;border-radius:10px;
  cursor:pointer;display:none;align-items:center;justify-content:center;
  color:var(--red);transition:all .15s;-webkit-tap-highlight-color:transparent;
}
#stop-btn.show{display:flex}
#stop-btn:active{background:#3a1818}

.hint-row{margin-top:6px;display:flex;align-items:center;justify-content:space-between}
.hint{font-family:var(--mono);font-size:10px;color:var(--text3)}
#tkcount{font-family:var(--mono);font-size:10px;color:var(--text3)}

/* overlay backdrop (mobile) */
#overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.55);z-index:150;
  -webkit-tap-highlight-color:transparent;
}
#overlay.show{display:block}

/* ══════════════════════════════════════
   MOBILE  (≤ 699px)
   sidebar slides in as drawer
══════════════════════════════════════ */
@media(max-width:699px){
  #shell{
    grid-template-columns:1fr;
    grid-template-areas:"hdr" "main";
  }
  #menu-btn{display:flex}
  #conn span:last-child{display:none} /* hide text, keep dot */
  #conn{padding:3px 7px}

  /* sidebar becomes a full-height drawer */
  #side{
    position:fixed;top:0;left:0;bottom:0;
    width:min(300px, 85vw);
    z-index:160;
    transform:translateX(-110%);
    box-shadow:4px 0 24px rgba(0,0,0,.5);
  }
  #side.open{transform:translateX(0)}

  /* top padding for safe area on iOS */
  .side-scroll{
    padding-top:calc(14px + env(safe-area-inset-top, 0px));
  }

  /* add close button at top of drawer */
  #side-close{
    display:flex;align-items:center;justify-content:space-between;
    padding:12px 13px 8px;border-bottom:1px solid var(--border);flex-shrink:0;
  }
  .side-close-title{font-family:var(--mono);font-size:11px;color:var(--gold);letter-spacing:.08em}
  #close-drawer-btn{
    background:none;border:none;color:var(--text2);cursor:pointer;
    padding:4px;border-radius:5px;-webkit-tap-highlight-color:transparent;
  }

  .msg.user .bbl,.msg.asst .bbl{max-width:calc(100vw - 80px)}
  .bbl{font-size:13px}
  .hint{display:none}
}

/* show drawer close btn only on mobile */
#side-close{display:none}
@media(max-width:699px){#side-close{display:flex}}
</style>
</head>
<body>

<div id="overlay" onclick="closeDrawer()"></div>

<div id="shell">

  <!-- Header -->
  <header id="hdr">
    <button id="menu-btn" onclick="openDrawer()" aria-label="菜单">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <div class="logo-box">TC</div>
    <div class="logo-txt">腾讯云 <b>Coding Plan</b></div>
    <div class="hdr-sp"></div>
    <div id="conn"><span class="dot"></span><span id="conn-txt">未配置</span></div>
  </header>

  <!-- Sidebar / Drawer -->
  <aside id="side">
    <div id="side-close">
      <span class="side-close-title">⚙ 配置</span>
      <button id="close-drawer-btn" onclick="closeDrawer()" aria-label="关闭">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="side-scroll">

      <div>
        <div class="sec-hd">API 配置</div>
        <div class="f">
          <label>API KEY</label>
          <input type="password" id="api-key" placeholder="sk-sp-xxxx" autocomplete="off" oninput="onKey()">
        </div>
        <div class="f">
          <label>BASE URL 协议</label>
          <div class="tabs">
            <button class="tab on" onclick="setProto('openai',this)">OpenAI 兼容</button>
            <button class="tab" onclick="setProto('anthropic',this)">Anthropic</button>
          </div>
          <input type="text" id="base-url" value="https://api.lkeap.cloud.tencent.com/coding/v3" oninput="saveCfg()">
        </div>
      </div>

      <div>
        <div class="sec-hd">模型</div>
        <div class="mlist" id="mlist"></div>
      </div>

      <div>
        <div class="sec-hd">参数</div>
        <div class="f">
          <label>TEMPERATURE <b id="tv" style="color:var(--gold)">0.7</b></label>
          <div class="srow">
            <input type="range" id="temp" min="0" max="2" step="0.05" value="0.7"
              oninput="document.getElementById('tv').textContent=parseFloat(this.value).toFixed(2);saveCfg()">
          </div>
        </div>
        <div class="f">
          <label>MAX TOKENS</label>
          <input type="text" id="max-tok" value="2048" oninput="saveCfg()">
        </div>
        <div class="f">
          <label>系统提示词（可选）</label>
          <textarea id="sys-prompt" rows="3" placeholder="你是一个专业的 AI 助手…" oninput="saveCfg()"></textarea>
        </div>
      </div>

    </div>
  </aside>

  <!-- Main -->
  <main id="main">
    <div id="tbar">
      <div class="tbar-m">模型：<span id="cur-m">tc-code-latest</span></div>
      <div class="tbar-sp"></div>
      <button class="tbtn" onclick="exportChat()">导出</button>
      <button class="tbtn del" onclick="clearChat()">清空</button>
    </div>

    <div id="msgs">
      <div id="empty">
        <div class="ei">◈</div>
        <h2>开始对话</h2>
        <p>填入 <b style="color:var(--gold)">API Key</b>，选择模型后即可开始</p>
        <div class="qrow">
          <button class="qbtn" onclick="q('用 Python 写快速排序')">快速排序</button>
          <button class="qbtn" onclick="q('解释 Transformer 架构')">Transformer</button>
          <button class="qbtn" onclick="q('帮我优化这段代码')">代码优化</button>
          <button class="qbtn" onclick="q('介绍 RAG 的工作原理')">RAG 原理</button>
          <button class="qbtn" onclick="q('写一个 React Hooks 示例')">React Hooks</button>
        </div>
      </div>
    </div>

    <div id="inp-area">
      <div class="inp-row">
        <textarea id="uinput" rows="1" placeholder="输入消息…"></textarea>
        <button id="send-btn" onclick="send()" aria-label="发送">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
        <button id="stop-btn" onclick="stopStream()" aria-label="停止">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
            <rect x="4" y="4" width="16" height="16" rx="2"/>
          </svg>
        </button>
      </div>
      <div class="hint-row">
        <span class="hint">Enter 发送 · Shift+Enter 换行</span>
        <span id="tkcount"></span>
      </div>
    </div>
  </main>
</div>

<script>
'use strict';

// ── Models ──
const MODELS=[
  {n:'Auto',           v:'tc-code-latest',       t:'AUTO'},
  {n:'HY 2.0 Instruct',v:'hunyuan-2.0-instruct', t:'HY'},
  {n:'HY 2.0 Think',  v:'hunyuan-2.0-thinking',  t:'THINK'},
  {n:'MiniMax M2.5',  v:'minimax-m2.5',           t:'MM'},
  {n:'Kimi K2.5',     v:'kimi-k2.5',              t:'KIMI'},
  {n:'GLM-5',         v:'glm-5',                  t:'GLM'},
  {n:'Hunyuan T1',    v:'hunyuan-t1',             t:'T1'},
  {n:'Hunyuan TurboS',v:'hunyuan-turbos',         t:'TURBO'},
];

let selModel='tc-code-latest', history=[], streamCtrl=null, streaming=false;

// ── Build model list ──
(function(){
  const el=document.getElementById('mlist');

    d.onclick=()=>{selModel=m.v;document.querySelectorAll('.mitem').forEach(x=>x.classList.toggle('on',x.dataset.v===m.v));document.getElementById('cur-m').textContent=m.n;saveCfg();};
    el.appendChild(d);

// ── Persist ──
function saveCfg(){
  try{localStorage.setItem('cp_cfg',JSON.stringify({
    baseUrl:document.getElementById('base-url').value,
    maxTok:document.getElementById('max-tok').value,
    temp:document.getElementById('temp').value,
    sys:document.getElementById('sys-prompt').value,
    model:selModel,
  }));}catch{}
}
function saveKey(){try{localStorage.setItem('cp_key',document.getElementById('api-key').value);}catch{}}
function onKey(){saveKey();const v=document.getElementById('api-key').value.trim();setConn(v?'ready':'','');}

function loadCfg(){
  try{
    const k=localStorage.getItem('cp_key');
    if(k){document.getElementById('api-key').value=k;setConn('ready','已配置');}
    const c=JSON.parse(localStorage.getItem('cp_cfg')||'{}');
    if(c.baseUrl){document.getElementById('base-url').value=c.baseUrl;if(c.baseUrl.includes('anthropic')){document.querySelectorAll('.tab')[1].click();}}
    if(c.maxTok)document.getElementById('max-tok').value=c.maxTok;
    if(c.temp){document.getElementById('temp').value=c.temp;document.getElementById('tv').textContent=parseFloat(c.temp).toFixed(2);}
    if(c.sys)document.getElementById('sys-prompt').value=c.sys;
    if(c.model){const m=MODELS.find(x=>x.v===c.model);if(m){selModel=c.model;document.querySelectorAll('.mitem').forEach(x=>x.classList.toggle('on',x.dataset.v===c.model));document.getElementById('cur-m').textContent=m.n;}}
  }catch{}
}

// ── Proto tabs ──
function setProto(type,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  btn.classList.add('on');
  const urls={openai:'https://api.lkeap.cloud.tencent.com/coding/v3',anthropic:'https://api.lkeap.cloud.tencent.com/coding/anthropic'};

// ── Drawer (mobile) ──
function openDrawer(){document.getElementById('side').classList.add('open');document.getElementById('overlay').classList.add('show');document.body.style.overflow='hidden';}
function closeDrawer(){document.getElementById('side').classList.remove('open');document.getElementById('overlay').classList.remove('show');}

// ── Connection badge ──
function setConn(state,txt){
  const el=document.getElementById('conn');
  el.className=state?('conn-status '+state):'';
  document.getElementById('conn-txt').textContent=txt||{ready:'已配置',busy:'生成中',error:'错误'}[state]||'未配置';

// ── Textarea auto-resize ──
const ta=document.getElementById('uinput');
ta.addEventListener('input',()=>{
  ta.style.height='auto';
  ta.style.height=Math.min(ta.scrollHeight,140)+'px';
  const w=ta.value.trim().split(/\s+/).filter(Boolean).length;
  document.getElementById('tkcount').textContent=w?`~${Math.ceil(w*1.4)} tokens`:'';
});
ta.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}});
function q(t){ta.value=t;ta.dispatchEvent(new Event('input'));ta.focus();}

// ── Markdown ──
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function md(raw){
  const blocks=[];
  let s=raw.replace(/```([\w]*)\n?([\s\S]*?)```/g,(_,lang,code)=>{
    const i=blocks.length,l=lang||'code';
    blocks.push(`<pre><div class="code-hdr"><span class="code-lang">${esc(l)}</span><button class="code-cp" onclick="cpCode(this)">复制</button></div><code>${esc(code.trimEnd())}</code></pre>`);
    return `\x00${i}\x00`;
  });
  s=s.replace(/`([^`\n]+)`/g,(_,c)=>`<code>${esc(c)}</code>`);
  s=s.replace(/^(#{1,4})\s+(.+)$/gm,(_,h,t)=>`<h${h.length}>${t}</h${h.length}>`);
  s=s.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');
  s=s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  s=s.replace(/\*(.+?)\*/g,'<em>$1</em>');
  s=s.replace(/^&gt;\s?(.+)$/gm,'<blockquote>$1</blockquote>');
  s=s.replace(/^[-*+]\s+(.+)$/gm,'<li>$1</li>');
  s=s.replace(/((<li>[\s\S]*?<\/li>\n*)+)/g,'<ul>$1</ul>');
  s=s.replace(/^\d+\.\s+(.+)$/gm,'<oli>$1</oli>');
  s=s.replace(/((<oli>[\s\S]*?<\/oli>\n*)+)/g,m=>'<ol>'+m.replace(/<oli>/g,'<li>').replace(/<\/oli>/g,'</li>')+'</ol>');
  s=s.replace(/\[(.+?)\]\((.+?)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  s=s.split('\n').map(l=>{const t=l.trim();if(!t||/^<(h[1-4]|ul|ol|pre|blockquote|hr|\x00)/.test(t))return t;return`<p>${t}</p>`;}).join('');
  return s.replace(/\x00(\d+)\x00/g,(_,i)=>blocks[+i]);
}
function cpCode(btn){
  navigator.clipboard.writeText(btn.closest('pre').querySelector('code').textContent).then(()=>{btn.textContent='已复制';setTimeout(()=>btn.textContent='复制',1500);});
}

// ── DOM helpers ──
function rmEmpty(){document.getElementById('empty')?.remove();}
const msgsEl=()=>document.getElementById('msgs');

function addMsg(role,content){
  rmEmpty();
  const w=document.createElement('div');
  w.className=`msg ${role}`;
  const isU=role==='user',isE=role==='err';
  w.innerHTML=`<div class="av ${isU?'you':isE?'bad':'ai'}">${isU?'YOU':isE?'!':'AI'}</div><div class="bbl">${isU?esc(content).replace(/\n/g,'<br>'):isE?esc(content):md(content)}</div>`;
  const m=msgsEl();m.appendChild(w);m.scrollTop=m.scrollHeight;
  return w;
}

function streamBubble(){
  rmEmpty();
  const m=msgsEl();
  const w=document.createElement('div');
  w.className='msg asst';
  w.innerHTML=`<div class="av ai">AI</div><div class="bbl"><div class="think"><div class="tdots"><span></span><span></span><span></span></div>等待响应…</div></div>`;
  m.appendChild(w);m.scrollTop=m.scrollHeight;
  let acc='',started=false;
  const bbl=w.querySelector('.bbl');
  return{
    add(c){if(!started){bbl.innerHTML='';started=true;}acc+=c;bbl.innerHTML=md(acc)+'<span class="cur"></span>';m.scrollTop=m.scrollHeight;},
    done(){bbl.innerHTML=md(acc);m.scrollTop=m.scrollHeight;return acc;},
    rm(){w.remove();}
  };
}

// ── Send ──
async function send(){
  const key=document.getElementById('api-key').value.trim();
  const url=document.getElementById('base-url').value.trim();
  const txt=ta.value.trim();
  const tok=parseInt(document.getElementById('max-tok').value)||2048;
  const tmp=parseFloat(document.getElementById('temp').value)||0.7;
  const sys=document.getElementById('sys-prompt').value.trim();

  if(!key){addMsg('err','请先填入 API Key（格式：sk-sp-xxxx）');return;}
  if(!txt||streaming)return;

  const msgs=[];
  if(sys)msgs.push({role:'system',content:sys});
  msgs.push(...history,{role:'user',content:txt});

  history.push({role:'user',content:txt});
  addMsg('user',txt);
  ta.value='';ta.style.height='auto';
  document.getElementById('tkcount').textContent='';

  // close drawer on mobile after send
  closeDrawer();

  streaming=true;
  document.getElementById('send-btn').disabled=true;
  document.getElementById('stop-btn').classList.add('show');
  setConn('busy','生成中');

  streamCtrl=new AbortController();
  const sb=streamBubble();

  try{
    const ep=url.replace(/\/$/,'')+'/chat/completions';
    const res=await fetch(ep,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${key}`,'Accept':'text/event-stream'},
      body:JSON.stringify({model:selModel,messages:msgs,max_tokens:tok,temperature:tmp,stream:true}),
      signal:streamCtrl.signal,
    });

    if(!res.ok){
      const t=await res.text();let em;
      try{em=JSON.parse(t)?.error?.message||t;}catch{em=t;}
      throw new Error(`HTTP ${res.status}: ${em}`);
    }

    const rdr=res.body.getReader();const dc=new TextDecoder();let buf='';
    while(true){
      const{done,value}=await rdr.read();if(done)break;
      buf+=dc.decode(value,{stream:true});
      const lines=buf.split('\n');buf=lines.pop();
      for(const l of lines){
        const ln=l.trim();
        if(!ln||ln==='data: [DONE]')continue;
        if(!ln.startsWith('data: '))continue;
        try{const d=JSON.parse(ln.slice(6));const c=d?.choices?.[0]?.delta?.content;if(c)sb.add(c);}catch{}
      }
    }

    const reply=sb.done();
    history.push({role:'assistant',content:reply});
    setConn('ready','已配置');

  }catch(e){
    sb.rm();
    if(e.name==='AbortError'){setConn('ready','已停止');}
    else{
      history.pop();
      let h='';
      if(/fetch|network|TypeError/i.test(e.message))h='\n\n• 请确认页面通过 HTTPS 访问（如 GitHub Pages）\n• 检查 API Key 和 Base URL 是否正确';
      else if(e.message.includes('401'))h='\n\n• API Key 无效，请检查 sk-sp-xxxx 格式';
      else if(e.message.includes('403'))h='\n\n• 无权限，确认套餐是否包含所选模型';
      else if(e.message.includes('429'))h='\n\n• 请求过于频繁，请稍后再试';
      else if(e.message.includes('500'))h='\n\n• 服务器错误，检查 Key 与协议是否匹配';
      addMsg('err','请求失败：'+e.message+h);
      setConn('error','请求失败');
    }
  }finally{
    streaming=false;streamCtrl=null;
    document.getElementById('send-btn').disabled=false;
    document.getElementById('stop-btn').classList.remove('show');
  }
}

function stopStream(){if(streamCtrl)streamCtrl.abort();}

function clearChat(){
  if(streaming)stopStream();
  history=[];
  document.getElementById('msgs').innerHTML=`
    <div id="empty">
      <div class="ei">◈</div><h2>开始对话</h2>
      <p>填入 <b style="color:var(--gold)">API Key</b>，选择模型后即可开始</p>
      <div class="qrow">
        <button class="qbtn" onclick="q('用 Python 写快速排序')">快速排序</button>
        <button class="qbtn" onclick="q('解释 Transformer 架构')">Transformer</button>
        <button class="qbtn" onclick="q('帮我优化这段代码')">代码优化</button>
        <button class="qbtn" onclick="q('介绍 RAG 的工作原理')">RAG 原理</button>
        <button class="qbtn" onclick="q('写一个 React Hooks 示例')">React Hooks</button>
      </div>
    </div>`;
  setConn(document.getElementById('api-key').value.trim()?'ready':'','');
}

function exportChat(){
  if(!history.length)return;
  const md2=history.map(m=>`### ${m.role==='user'?'用户':'AI'}\n\n${m.content}`).join('\n\n---\n\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([`# Coding Plan 对话\n\n导出：${new Date().toLocaleString()}\n\n---\n\n${md2}`],{type:'text/markdown'}));
  a.download=`chat-${Date.now()}.md`;a.click();
}
